<div class="container">
  <div class="login-box">
    <h1>Create Account</h1>
    <p class="subtitle">Sign up to get started</p>

    <form [formGroup]="myForm" (ngSubmit)="onSubmit()">
      <div class="input-group">

        <input type="text" class="input" placeholder="Full Name" formControlName="fullName" />

        <input type="email" class="input" placeholder="Email" formControlName="email" />

        <input type="tel" class="input" placeholder="Phone Number" formControlName="phoneNumber" />

        <input type="password" class="input" placeholder="Password" formControlName="password" />

        <input type="password" class="input" placeholder="Confirm Password" formControlName="confirmPassword" />

        <!-- LOCATION -->
        <div formGroupName="location">

          <input type="text" class="input" placeholder="City" formControlName="city" />

          <input type="text" class="input" placeholder="Country" formControlName="country" />

          <input type="number" class="input" placeholder="Latitude" formControlName="latitude" />

          <input type="number" class="input" placeholder="Longitude" formControlName="longitude" />

        </div>

      </div>

      <button type="submit" class="login-btn" [disabled]="isLoading">
        {{ isLoading ? 'Creating account...' : 'Sign Up' }}
      </button>

      <div class="divider"><span>or continue with</span></div>

      <button type="button" class="apple-btn">Sign up with Apple</button>
      <button type="button" class="google-btn">Sign up with Google</button>
    </form>

    <div class="donot">
      <p>Already have an account? <a (click)="goToLogin()">Sign In</a></p>
    </div>
  </div>

  <div class="image-side signup-img"></div>
</div>
